// Using the if..else construct, write the code which asks: ‘What is the “official” name of JavaScript?’

// If the visitor enters “ECMAScript”, then output “Right!”, otherwise – output: “You don’t know? ECMAScript!”

<!DOCTYPE html>
<html>
    <head>
        <title>If Else Exercies</title>
    </head>
    <body>
        <h1>This is an If-Else Exercise</h1>
        <script>
            let fam = prompt("What is the official name of JavaScript", " ");

            if (fam == "ECMAScript") {
                alert("Right")
            } else {
                alert("Wrong")
            };
        </script>
    </body>
</html>
